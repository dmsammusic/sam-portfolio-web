<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JSON Formatter</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>

    <!-- Monaco -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/json5@2.2.3/dist/index.min.js"></script>
  </head>

  <body
    class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 pt-20 font-sans"
  >
    <!-- HEADER -->
    <header class="fixed top-0 w-full bg-white dark:bg-gray-800 border-b z-10">
      <div
        class="container mx-auto px-6 py-4 flex justify-between items-center"
      >
        <h1 class="text-xl font-bold">Sam Solomon Raja M</h1>

        <ul class="flex space-x-6 items-center">
          <li><a href="./blog.html" class="hover:text-gray-600">Blog</a></li>
          <li><a href="./index.html" class="hover:text-gray-600">Home</a></li>
          <li><a href="#" class="hover:text-gray-600">Tools ▼</a></li>
          <li><a href="#" class="hover:text-gray-600">Contact</a></li>

          <!-- THEME SWITCH -->
          <li>
            <label class="switch">
              <input
                type="checkbox"
                id="themeToggle"
                onchange="toggleTheme()"
              />
              <span class="slider"></span>
            </label>
          </li>
        </ul>
      </div>

      
    </header>


    

    <!-- MAIN -->
    <div
      class="max-w-5xl mx-auto mt-10 p-6 bg-white dark:bg-gray-800 shadow-lg rounded-lg"
    >
      <h1 class="text-3xl font-bold text-center mb-6">JSON Formatter</h1>

      <!-- MONACO -->
      <div
        id="editor"
        style="height: 400px; border-radius: 8px; border: 1px solid #ddd"
      ></div>

      <!-- BUTTONS -->
      <div class="flex gap-4 mt-4 flex-wrap items-center">
        <button
          onclick="formatJSON()"
          class="bg-black text-white px-4 py-2 rounded dark:bg-white dark:text-black"
        >
          Format
        </button>

        <button
          onclick="minifyJSON()"
          class="border px-4 py-2 rounded dark:border-gray-600"
        >
          Minify
        </button>

        <button
          onclick="clearJSON()"
          class="border px-4 py-2 rounded dark:border-gray-600"
        >
          Clear
        </button>

        <button
          onclick="copyJSON()"
          class="border px-4 py-2 rounded dark:border-gray-600"
        >
          Copy
        </button>

        <span
          id="msg"
          class="text-sm ml-2 opacity-0 transition-all duration-300"
        ></span>
      </div>
    </div>

    <!-- TOGGLE CSS -->
    <style>
      .switch {
        position: relative;
        width: 36px;
        height: 20px;
        display: inline-block;
      }
      .switch input {
        opacity: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #ccc;
        border-radius: 999px;
        transition: 0.3s;
      }
      .slider:before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        top: 2px;
        left: 2px;
        background: white;
        border-radius: 50%;
        transition: 0.3s;
      }
      input:checked + .slider {
        background: #000;
      }
      input:checked + .slider:before {
        transform: translateX(16px);
      }
    </style>

    <script>
      let editor;

      // ===== MONACO INIT =====
      require.config({
        paths: {
          vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs",
        },
      });

      require(["vs/editor/editor.main"], function () {
        const isDark = document.documentElement.classList.contains("dark");

        editor = monaco.editor.create(document.getElementById("editor"), {
          value: `{
  "userId": 1,
  "id": 1,
  "title": "sample",
  "completed": false
}`,
          language: "json",
          theme: isDark ? "vs-dark" : "vs",
          automaticLayout: true,
          fontSize: 14,
          minimap: { enabled: false },
        });

        monaco.languages.json.jsonDefaults.setDiagnosticsOptions({
          validate: true,
          allowComments: true,
        });

        // Auto format on paste
        editor.onDidPaste(() => {
          setTimeout(() => formatJSON(), 200);
        });
      });

      // ===== THEME SYSTEM =====
      window.addEventListener("DOMContentLoaded", () => {
        const saved = localStorage.getItem("theme");

        if (saved) {
          applyTheme(saved);
        } else {
          const systemDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          applyTheme(systemDark ? "dark" : "light");
        }
      });

      function applyTheme(mode) {
        const isDark = mode === "dark";

        document.documentElement.classList.toggle("dark", isDark);

        const toggle = document.getElementById("themeToggle");
        if (toggle) toggle.checked = isDark;

        if (window.monaco && window.editor) {
          monaco.editor.setTheme(isDark ? "vs-dark" : "vs");
        }
      }

      function toggleTheme() {
        const isDark = document.getElementById("themeToggle").checked;
        const mode = isDark ? "dark" : "light";

        localStorage.setItem("theme", mode);
        applyTheme(mode);
      }

      // Auto update on system change
      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", (e) => {
          const saved = localStorage.getItem("theme");
          if (!saved) {
            applyTheme(e.matches ? "dark" : "light");
          }
        });

      // ===== UI MESSAGE =====
      function showMsg(text, type = "success") {
        const msg = document.getElementById("msg");

        msg.textContent = text;
        msg.className =
          "text-sm ml-2 transition-all duration-300 " +
          (type === "error" ? "text-red-500" : "text-green-600");

        msg.classList.remove("opacity-0");

        setTimeout(() => {
          msg.classList.add("opacity-0");
        }, 1500);
      }

      // ===== ACTIONS =====

      function sanitizeJSON(input) {
        let fixed = input;

        // 1. Fix mixed quotes like "key': → "key":
        fixed = fixed.replace(/"([^"]+)'\s*:/g, '"$1":');

        // 2. Fix keys without quotes → key:
        fixed = fixed.replace(/(\b\w+\b)\s*:/g, '"$1":');

        // 3. Replace single quotes → double quotes (values only)
        fixed = fixed.replace(/:\s*'([^']*)'/g, ': "$1"');

        // 4. Remove trailing commas
        fixed = fixed.replace(/,\s*([}\]])/g, "$1");

        return fixed;
      }

      function formatJSON() {
        try {
          let value = editor.getValue();

          // 🔥 sanitize before parsing
          value = sanitizeJSON(value);

          const parsed = JSON.parse(value);

          editor.setValue(JSON.stringify(parsed, null, 2));

          showMsg("Fixed & Formatted ✓");
        } catch (e) {
          showMsg("Still invalid JSON ✗", "error");
        }
      }

      function minifyJSON() {
        try {
          let value = sanitizeJSON(editor.getValue());

          const parsed = JSON.parse(value);

          editor.setValue(JSON.stringify(parsed));

          showMsg("Fixed & Minified ✓");
        } catch {
          showMsg("Invalid JSON ✗", "error");
        }
      }

      function clearJSON() {
        editor.setValue("");
        showMsg("Cleared");
      }

      function copyJSON() {
        const value = editor.getValue();
        if (!value) return;

        navigator.clipboard.writeText(value);
        showMsg("Copied ✓");
      }
    </script>
  </body>
</html>
